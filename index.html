<!DOCTYPE html>
<html lang="id"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Minecraft Web Sandbox (AABB Physics)</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "simplex-noise": "https://cdn.skypack.dev/simplex-noise@3.0.0"
            }
        }
    </script>
</head>
<body>
    <div id="coords">X: 0 | Y: 0 | Z: 0</div>
    <div id="ui">
        <h2 style="margin-top: 0;">Sandbox Game</h2>
        <p><b>Jangan percaya wowo ygy</b> HIDOEP BLONDE</p>
        <p>Klik / Sentuh untuk Mulai</p>
    </div>
    <div id="crosshair">+</div>

    <div class="mobile-controls" id="dpad">
        <div class="joystick-btn" id="btn-up">W</div>
        <div class="joystick-btn" id="btn-left">A</div>
        <div class="joystick-btn" id="btn-right">D</div>
        <div class="joystick-btn" id="btn-down">S</div>
    </div>
    <div class="mobile-controls" id="jump-btn">⬆</div>

    <script type="module" src="script.js"></script>
</body>
</html>
